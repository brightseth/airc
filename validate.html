<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIE — AIRC Protocol Validator</title>
    <meta name="description" content="ARCHIE is the AIRC protocol conformance validator. Test any AIRC registry against the specification in real time.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    <meta property="og:title" content="ARCHIE — AIRC Protocol Validator">
    <meta property="og:description" content="Live conformance testing for AIRC registries. Test discovery, presence, federation, and message schema compliance.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://airc.chat/validate">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #000;
            color: #e0e0e0;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            position: sticky;
            top: 0;
            background: #000;
            border-bottom: 1px solid #1F2937;
            padding: 16px 24px;
            z-index: 100;
        }
        nav .nav-inner {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav .logo {
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
            text-decoration: none;
            letter-spacing: 0.1em;
        }
        nav .logo:hover { color: #6B8FFF; }
        nav .nav-links { display: flex; gap: 32px; }
        nav .nav-links a {
            color: #9CA3AF;
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.2s;
        }
        nav .nav-links a:hover { color: #fff; }
        nav .nav-links a.active { color: #6B8FFF; }

        /* Container */
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 60px 24px;
        }

        /* Header */
        .page-header {
            margin-bottom: 48px;
            padding-bottom: 32px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .page-header h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 4px;
        }
        .page-header .subtitle {
            font-size: 1rem;
            color: #999;
            margin-bottom: 8px;
        }
        .page-header .version {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Input Section */
        .input-section {
            margin-bottom: 40px;
        }
        .input-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .input-row input[type="text"] {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0;
            color: #fff;
            font-family: 'SF Mono', Monaco, 'Courier New', monospace;
            font-size: 0.9rem;
            padding: 12px 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-row input[type="text"]:focus {
            border-color: #6B8FFF;
        }
        .input-row input[type="text"]::placeholder {
            color: #444;
        }
        .btn-run {
            background: #6B8FFF;
            color: #000;
            border: none;
            border-radius: 0;
            padding: 12px 28px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-run:hover { background: #8BABFF; }
        .btn-run:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        /* Quick-add buttons */
        .quick-add {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .quick-add-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-right: 4px;
        }
        .quick-add button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0;
            color: #999;
            font-family: 'SF Mono', Monaco, 'Courier New', monospace;
            font-size: 0.75rem;
            padding: 6px 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-add button:hover {
            border-color: #6B8FFF;
            color: #6B8FFF;
        }

        /* Test Results */
        .results-section {
            margin-bottom: 40px;
        }
        .results-header {
            font-size: 0.75rem;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 16px;
        }
        .test-grid {
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .test-row {
            display: grid;
            grid-template-columns: 200px 80px 80px 1fr;
            gap: 0;
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom: none;
            padding: 16px 20px;
            align-items: start;
            transition: background 0.15s;
        }
        .test-row:last-child {
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .test-row:hover {
            background: rgba(255,255,255,0.02);
        }
        .test-row.running {
            background: rgba(107, 143, 255, 0.03);
        }

        /* Table header row */
        .test-row.header-row {
            background: rgba(255,255,255,0.02);
            padding: 10px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .test-row.header-row span {
            font-size: 0.7rem;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .test-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
        }
        .test-name .test-desc {
            display: block;
            font-size: 0.75rem;
            font-weight: 400;
            color: #666;
            margin-top: 2px;
        }

        .test-status {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .status-pass { color: #22c55e; }
        .status-fail { color: #ef4444; }
        .status-warn { color: #f59e0b; }
        .status-skip { color: #666; }
        .status-pending { color: #333; }
        .status-running { color: #6B8FFF; }

        .test-time {
            font-family: 'SF Mono', Monaco, 'Courier New', monospace;
            font-size: 0.75rem;
            color: #666;
        }

        .test-detail {
            font-family: 'SF Mono', Monaco, 'Courier New', monospace;
            font-size: 0.72rem;
            color: #666;
            line-height: 1.5;
            word-break: break-all;
            max-height: 120px;
            overflow-y: auto;
        }
        .test-detail .response-snippet {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 8px 10px;
            margin-top: 6px;
            white-space: pre-wrap;
            max-height: 80px;
            overflow-y: auto;
        }
        .test-detail .check-item {
            margin: 2px 0;
        }
        .check-pass { color: #22c55e; }
        .check-fail { color: #ef4444; }

        /* Summary Bar */
        .summary-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px 24px;
            margin-top: 32px;
            background: rgba(255,255,255,0.02);
        }
        .summary-left {
            display: flex;
            gap: 32px;
            align-items: center;
        }
        .summary-stat {
            text-align: center;
        }
        .summary-stat .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }
        .summary-stat .stat-label {
            font-size: 0.65rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .summary-score {
            text-align: right;
        }
        .summary-score .score-value {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -1px;
        }
        .summary-score .score-label {
            font-size: 0.65rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Progress indicator */
        .progress-bar {
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.05);
            margin-bottom: 24px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .progress-bar.active {
            opacity: 1;
        }
        .progress-bar .progress-fill {
            height: 100%;
            background: #6B8FFF;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .empty-state .empty-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }
        .empty-state .empty-desc {
            font-size: 0.8rem;
            color: #444;
        }

        /* Footer */
        .footer {
            margin-top: 80px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .footer-left {
            font-size: 0.75rem;
            color: #444;
        }
        .footer-right a {
            font-size: 0.75rem;
            color: #666;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .footer-right a:hover {
            color: #6B8FFF;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-header h1 { font-size: 2rem; }
            .test-row {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            .test-row.header-row { display: none; }
            .input-row { flex-direction: column; }
            .summary-bar { flex-direction: column; gap: 24px; align-items: flex-start; }
            .summary-left { gap: 24px; }
            nav .nav-links { gap: 16px; flex-wrap: wrap; }
        }

        /* Scrollbar styling */
        .test-detail .response-snippet::-webkit-scrollbar,
        .test-detail::-webkit-scrollbar {
            width: 4px;
        }
        .test-detail .response-snippet::-webkit-scrollbar-track,
        .test-detail::-webkit-scrollbar-track {
            background: transparent;
        }
        .test-detail .response-snippet::-webkit-scrollbar-thumb,
        .test-detail::-webkit-scrollbar-thumb {
            background: #333;
        }

        /* Animation for running state */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .status-running {
            animation: pulse 1.2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="/" class="logo">AIRC</a>
            <div class="nav-links">
                <a href="/#why">Why</a>
                <a href="/#how">How</a>
                <a href="/extensions/">Extensions</a>
                <a href="/ecosystem">Ecosystem</a>
                <a href="/spec">Spec</a>
                <a href="/developers">Developers</a>
                <a href="/validate" class="active">Validate</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Header -->
        <div class="page-header">
            <h1>ARCHIE</h1>
            <div class="subtitle">AIRC Protocol Validator</div>
            <div class="version">v0.1</div>
        </div>

        <!-- Input -->
        <div class="input-section">
            <div class="input-row">
                <input type="text" id="registry-url" placeholder="https://www.airc.chat" value="https://www.airc.chat">
                <button class="btn-run" id="btn-run" onclick="runTests()">Run Tests</button>
            </div>
            <div class="quick-add">
                <span class="quick-add-label">Registries</span>
                <button onclick="setRegistry('https://www.airc.chat')">airc.chat</button>
                <button onclick="setRegistry('https://demo.airc.chat')">demo.airc.chat</button>
            </div>
        </div>

        <!-- Progress -->
        <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>

        <!-- Results -->
        <div class="results-section" id="results-section">
            <div class="results-header">Test Results</div>
            <div id="test-grid">
                <div class="empty-state">
                    <div class="empty-title">No tests run</div>
                    <div class="empty-desc">Enter a registry URL and click Run Tests to begin conformance validation.</div>
                </div>
            </div>
        </div>

        <!-- Summary (hidden until tests run) -->
        <div id="summary-bar" style="display: none;"></div>

        <!-- Footer -->
        <div class="footer">
            <div class="footer-left">ARCHIE -- The Bridge Builder -- AIRC Protocol Conformance</div>
            <div class="footer-right"><a href="/spec">Read the Spec</a></div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // ====================================================================
        // Test Definitions
        // ====================================================================

        var TESTS = [
            {
                id: 'well-known',
                name: 'Well-Known Discovery',
                desc: 'GET /.well-known/airc',
                requiredFields: ['protocol_version', 'registry_url', 'capabilities'],
                run: async function(baseUrl) {
                    var url = baseUrl + '/.well-known/airc';
                    var res = await timedFetch(url);
                    var data = res.data;
                    var checks = [];

                    checks.push(checkField(data, 'protocol_version'));
                    checks.push(checkField(data, 'registry_url'));
                    checks.push(checkField(data, 'capabilities'));

                    var allPass = checks.every(function(c) { return c.pass; });
                    return {
                        status: allPass ? 'pass' : 'fail',
                        time: res.time,
                        checks: checks,
                        snippet: truncateJSON(data)
                    };
                }
            },
            {
                id: 'health',
                name: 'Health Endpoint',
                desc: 'GET /api/health',
                requiredFields: ['status', 'protocol_version', 'agents_online'],
                run: async function(baseUrl) {
                    var url = baseUrl + '/api/health';
                    var res = await timedFetch(url);
                    var data = res.data;
                    var checks = [];

                    checks.push(checkField(data, 'status'));
                    checks.push(checkField(data, 'protocol_version'));
                    checks.push(checkField(data, 'agents_online'));

                    var allPass = checks.every(function(c) { return c.pass; });
                    return {
                        status: allPass ? 'pass' : 'fail',
                        time: res.time,
                        checks: checks,
                        snippet: truncateJSON(data)
                    };
                }
            },
            {
                id: 'presence',
                name: 'Presence API',
                desc: 'GET /api/presence',
                requiredFields: ['success', 'agents'],
                run: async function(baseUrl) {
                    var url = baseUrl + '/api/presence';
                    var res = await timedFetch(url);
                    var data = res.data;
                    var checks = [];

                    checks.push(checkField(data, 'success'));
                    checks.push(checkField(data, 'agents', 'array'));

                    var allPass = checks.every(function(c) { return c.pass; });

                    var agentCount = '';
                    if (data && Array.isArray(data.agents)) {
                        agentCount = data.agents.length + ' agent(s) online';
                    }

                    return {
                        status: allPass ? 'pass' : 'fail',
                        time: res.time,
                        checks: checks,
                        snippet: truncateJSON(data),
                        note: agentCount
                    };
                }
            },
            {
                id: 'identity',
                name: 'Identity Lookup',
                desc: 'GET /api/presence?user=archie',
                requiredFields: ['presence object or error'],
                run: async function(baseUrl) {
                    var url = baseUrl + '/api/presence?user=archie';
                    var res = await timedFetch(url);
                    var data = res.data;
                    var checks = [];

                    // A valid response is either a presence object or an error
                    // indicating the user was not found -- both are correct behavior
                    var hasStructure = data && typeof data === 'object';
                    checks.push({
                        field: 'valid response',
                        pass: hasStructure,
                        detail: hasStructure ? 'JSON object returned' : 'Invalid response'
                    });

                    if (data && data.success === false) {
                        checks.push({
                            field: 'error handling',
                            pass: true,
                            detail: 'User not found (expected for "archie")'
                        });
                    } else if (data && (data.user || data.handle || data.agent)) {
                        checks.push({
                            field: 'presence data',
                            pass: true,
                            detail: 'Presence object returned'
                        });
                    } else if (data && data.success === true) {
                        checks.push({
                            field: 'response shape',
                            pass: true,
                            detail: 'Success response returned'
                        });
                    } else {
                        checks.push({
                            field: 'response shape',
                            pass: false,
                            detail: 'Unexpected response format'
                        });
                    }

                    var allPass = checks.every(function(c) { return c.pass; });
                    return {
                        status: allPass ? 'pass' : 'fail',
                        time: res.time,
                        checks: checks,
                        snippet: truncateJSON(data)
                    };
                }
            },
            {
                id: 'federation',
                name: 'Federation Readiness',
                desc: 'Check /.well-known/airc federation fields',
                requiredFields: ['federation_enabled', 'relay_endpoint'],
                run: async function(baseUrl) {
                    var url = baseUrl + '/.well-known/airc';
                    var res = await timedFetch(url);
                    var data = res.data;
                    var checks = [];

                    var hasFedEnabled = data && (data.federation_enabled !== undefined);
                    var hasRelay = data && (data.relay_endpoint !== undefined);

                    checks.push({
                        field: 'federation_enabled',
                        pass: hasFedEnabled,
                        detail: hasFedEnabled ? 'federation_enabled = ' + data.federation_enabled : 'Field missing'
                    });
                    checks.push({
                        field: 'relay_endpoint',
                        pass: hasRelay,
                        detail: hasRelay ? 'relay_endpoint = ' + data.relay_endpoint : 'Field missing'
                    });

                    var allPass = checks.every(function(c) { return c.pass; });
                    // Federation is optional, so missing fields are a WARN not FAIL
                    return {
                        status: allPass ? 'pass' : (hasFedEnabled || hasRelay ? 'warn' : 'warn'),
                        time: res.time,
                        checks: checks,
                        snippet: truncateJSON(data),
                        note: allPass ? 'Federation capable' : 'Federation fields incomplete'
                    };
                }
            },
            {
                id: 'message-schema',
                name: 'Message Schema',
                desc: 'POST /api/presence (empty body)',
                requiredFields: ['error response with correct shape'],
                run: async function(baseUrl) {
                    var url = baseUrl + '/api/presence';
                    var res = await timedFetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({})
                    });
                    var data = res.data;
                    var checks = [];

                    var hasStructure = data && typeof data === 'object';
                    checks.push({
                        field: 'valid JSON response',
                        pass: hasStructure,
                        detail: hasStructure ? 'JSON object returned' : 'Invalid response'
                    });

                    // Check for error indication (success: false, or error field, or status code info)
                    var hasError = data && (
                        data.success === false ||
                        data.error !== undefined ||
                        data.message !== undefined
                    );
                    checks.push({
                        field: 'error signaling',
                        pass: hasError,
                        detail: hasError ? 'Error correctly signaled for empty body' : 'No error signaling detected'
                    });

                    var allPass = checks.every(function(c) { return c.pass; });
                    return {
                        status: allPass ? 'pass' : (hasStructure ? 'warn' : 'fail'),
                        time: res.time,
                        checks: checks,
                        snippet: truncateJSON(data),
                        note: 'Validates error response shape for missing fields'
                    };
                }
            }
        ];

        // ====================================================================
        // Utilities
        // ====================================================================

        async function timedFetch(url, options) {
            var start = performance.now();
            try {
                var res = await fetch(url, options || {});
                var elapsed = Math.round(performance.now() - start);
                var text = await res.text();
                var data;
                try {
                    data = JSON.parse(text);
                } catch(e) {
                    data = { _raw: text.substring(0, 500) };
                }
                return { data: data, time: elapsed, status: res.status };
            } catch(err) {
                var elapsed = Math.round(performance.now() - start);
                return {
                    data: null,
                    time: elapsed,
                    status: 0,
                    error: err.message
                };
            }
        }

        function checkField(data, field, expectedType) {
            if (!data || data[field] === undefined) {
                return { field: field, pass: false, detail: 'Missing field: ' + field };
            }
            if (expectedType === 'array' && !Array.isArray(data[field])) {
                return { field: field, pass: false, detail: field + ' is not an array' };
            }
            var val = data[field];
            var display = typeof val === 'object' ? JSON.stringify(val).substring(0, 60) : String(val);
            return { field: field, pass: true, detail: field + ' = ' + display };
        }

        function truncateJSON(data) {
            if (!data) return 'null';
            var str = JSON.stringify(data, null, 2);
            if (str.length > 400) {
                return str.substring(0, 400) + '\n...';
            }
            return str;
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ====================================================================
        // UI Rendering
        // ====================================================================

        function renderTestGrid(tests) {
            var grid = document.getElementById('test-grid');
            var html = '';

            // Header row
            html += '<div class="test-row header-row">';
            html += '<span>Test</span>';
            html += '<span>Status</span>';
            html += '<span>Time</span>';
            html += '<span>Detail</span>';
            html += '</div>';

            tests.forEach(function(test) {
                html += '<div class="test-row" id="row-' + test.id + '">';
                html += '<div class="test-name">' + escapeHtml(test.name);
                html += '<span class="test-desc">' + escapeHtml(test.desc) + '</span></div>';
                html += '<div class="test-status status-pending" id="status-' + test.id + '">--</div>';
                html += '<div class="test-time" id="time-' + test.id + '">--</div>';
                html += '<div class="test-detail" id="detail-' + test.id + '"></div>';
                html += '</div>';
            });

            grid.innerHTML = html;
        }

        function updateTestRow(test, result) {
            var row = document.getElementById('row-' + test.id);
            var statusEl = document.getElementById('status-' + test.id);
            var timeEl = document.getElementById('time-' + test.id);
            var detailEl = document.getElementById('detail-' + test.id);

            if (row) row.classList.remove('running');

            if (statusEl) {
                var statusClass = 'status-' + result.status;
                statusEl.className = 'test-status ' + statusClass;
                statusEl.textContent = result.status.toUpperCase();
            }

            if (timeEl) {
                timeEl.textContent = result.time + 'ms';
            }

            if (detailEl) {
                var html = '';

                // Render individual checks
                if (result.checks) {
                    result.checks.forEach(function(check) {
                        var icon = check.pass ? '[+]' : '[-]';
                        var cls = check.pass ? 'check-pass' : 'check-fail';
                        html += '<div class="check-item ' + cls + '">' + icon + ' ' + escapeHtml(check.detail) + '</div>';
                    });
                }

                // Note
                if (result.note) {
                    html += '<div style="color: #666; margin-top: 4px;">' + escapeHtml(result.note) + '</div>';
                }

                // Response snippet
                if (result.snippet) {
                    html += '<div class="response-snippet">' + escapeHtml(result.snippet) + '</div>';
                }

                // Error
                if (result.error) {
                    html += '<div class="check-fail">' + escapeHtml(result.error) + '</div>';
                }

                detailEl.innerHTML = html;
            }
        }

        function setRunning(testId) {
            var row = document.getElementById('row-' + testId);
            var statusEl = document.getElementById('status-' + testId);
            if (row) row.classList.add('running');
            if (statusEl) {
                statusEl.className = 'test-status status-running';
                statusEl.textContent = 'RUNNING';
            }
        }

        function renderSummary(results) {
            var total = results.length;
            var passed = results.filter(function(r) { return r.status === 'pass'; }).length;
            var warned = results.filter(function(r) { return r.status === 'warn'; }).length;
            var failed = results.filter(function(r) { return r.status === 'fail'; }).length;
            var score = Math.round((passed / total) * 100);

            // Color the score
            var scoreColor;
            if (score >= 80) scoreColor = '#22c55e';
            else if (score >= 50) scoreColor = '#f59e0b';
            else scoreColor = '#ef4444';

            var bar = document.getElementById('summary-bar');
            bar.style.display = '';
            bar.className = 'summary-bar';
            bar.innerHTML =
                '<div class="summary-left">' +
                    '<div class="summary-stat"><div class="stat-value" style="color: #22c55e;">' + passed + '</div><div class="stat-label">Passed</div></div>' +
                    '<div class="summary-stat"><div class="stat-value" style="color: #f59e0b;">' + warned + '</div><div class="stat-label">Warnings</div></div>' +
                    '<div class="summary-stat"><div class="stat-value" style="color: #ef4444;">' + failed + '</div><div class="stat-label">Failed</div></div>' +
                    '<div class="summary-stat"><div class="stat-value" style="color: #fff;">' + total + '</div><div class="stat-label">Total</div></div>' +
                '</div>' +
                '<div class="summary-score">' +
                    '<div class="score-value" style="color: ' + scoreColor + ';">' + score + '%</div>' +
                    '<div class="score-label">Conformance</div>' +
                '</div>';
        }

        // ====================================================================
        // Test Runner
        // ====================================================================

        var isRunning = false;

        window.runTests = async function() {
            if (isRunning) return;
            isRunning = true;

            var input = document.getElementById('registry-url');
            var btn = document.getElementById('btn-run');
            var progressBar = document.getElementById('progress-bar');
            var progressFill = document.getElementById('progress-fill');

            var baseUrl = input.value.trim().replace(/\/+$/, '');
            if (!baseUrl) {
                input.focus();
                isRunning = false;
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Running...';
            progressBar.classList.add('active');
            progressFill.style.width = '0%';

            // Render empty grid
            renderTestGrid(TESTS);
            document.getElementById('summary-bar').style.display = 'none';

            var results = [];

            for (var i = 0; i < TESTS.length; i++) {
                var test = TESTS[i];
                var pct = ((i) / TESTS.length) * 100;
                progressFill.style.width = pct + '%';

                setRunning(test.id);

                var result;
                try {
                    result = await test.run(baseUrl);
                } catch(err) {
                    result = {
                        status: 'fail',
                        time: 0,
                        checks: [],
                        error: 'Exception: ' + err.message
                    };
                }

                results.push(result);
                updateTestRow(test, result);

                // Small delay for visual effect
                await new Promise(function(r) { setTimeout(r, 120); });
            }

            progressFill.style.width = '100%';
            setTimeout(function() {
                progressBar.classList.remove('active');
            }, 600);

            renderSummary(results);

            btn.disabled = false;
            btn.textContent = 'Run Tests';
            isRunning = false;
        };

        window.setRegistry = function(url) {
            document.getElementById('registry-url').value = url;
        };

        // Allow Enter key to trigger tests
        document.getElementById('registry-url').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                runTests();
            }
        });

    })();
    </script>
</body>
</html>
